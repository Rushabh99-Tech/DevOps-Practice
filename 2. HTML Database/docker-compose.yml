version: '3.8'

services:

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: hobbydb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    volumes:
      - pgdata:/var/lib/postgresql/data

  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: hobbydb
      DB_USER: postgres
      DB_PASSWORD: password
    depends_on:
      - db

volumes:
  pgdata:
